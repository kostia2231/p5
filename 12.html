<html lang="ru"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariia Kvasnevska</title>
    <style>
        @font-face {
            font-family: "fOnT";
            src: url("font/GT-Alpina-Standard-Light-Trial.otf") format("opentype");
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background-color: white;
            font-family: system-ui, Helvetica, sans-serif;
            font-weight: 500;
            color: black;
            font-size: 14px;
            line-height: 1.15;
            letter-spacing: .01em;
        }

        img {
            height: 45vh;
            display: block;
        }

        #viewport {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            position: relative;
            cursor: default;
            overflow: hidden;
        }

        #world, .world__inner, .col-wrapper {
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
        }

        .col-wrapper {
            overflow-y: auto;
            overflow-x: hidden;
            pointer-events: none;
            scrollbar-width: none;
            overscroll-behavior: none;
        }
        .col-wrapper::-webkit-scrollbar { display: none; }

        .left-wrapper { z-index: 1; }
        .right-wrapper { z-index: 1; }

        .left, .right {
            width: 50%;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 100px;
            padding: 10px;
            box-sizing: border-box;
        }
        .right { margin-left: 50%; }

        .world-image {
            position: relative;
            user-select: none;
            -webkit-user-drag: none;
            cursor: pointer;
            height: fit-content;
            width: fit-content;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .image-desc {
            position: absolute;
            top: 5px;
            left: 5px;
            color: black;
            z-index: -1;
        }

        .world-image img {
            transition: filter 0.3s ease;
        }
        .world-image.is-active img {
            /*filter: opacity(0.9);*/
        }

        #cursor-image {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9;
            opacity: 0;
            transition: opacity 0.2s ease;
            will-change: transform, opacity;
        }
        #cursor-image.visible {
            opacity: 1;
        }
        #cursor-image img {
            display: block;
            box-shadow: none;
            filter: none;
            max-width: 100%;
        }
        #cursor-image img[src=""],
        #cursor-image img:not([src]) {
            visibility: hidden;
        }

        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            z-index: 90;
            padding: 5px;
            text-align: center;
        }

        .ui-layer__bottom {
            position: fixed;
            bottom: 0;
            width: 100vw;
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 5px;
            z-index: 90;
            padding: 5px;
            box-sizing: border-box;
            cursor: pointer;
            color: black;
            font-weight: 500;
        }

        .ui-layer__cat-navigation {
            display: flex;
            flex-direction: row;
            gap: 5px;
            justify-content: center;
            align-items: center;
            margin-inline: auto;
            transition: background-color 0.3s cubic-bezier(.77,0,.175,1);
        }

        .btn-custom__background {
            width: fit-content;
            pointer-events: auto;
            cursor: pointer;
            transition: color 0.3s cubic-bezier(.77,0,.175,1), padding 0.3s linear;
        }
        .btn-custom__background:hover {
            padding-left: 15px;
            padding-right: 15px;
            background-color: #F61D3D;
        }
        .btn-custom__inner {
            color: black;
        }

        .instructions {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: pointer;
            display: flex;
        }

        .divider {
            padding-top: 2.5px;
            padding-bottom: 2.5px;
            width: 1px;
            height: 100%;
            background-color: black;
            pointer-events: none;
        }

        .title {
            color: black;
            /*font-weight: 300;*/
            /*background-color: #FFFDCF;*/
        }

        .color-box {
            background-color: #FFFDCF;
        }

        .information {
            position: fixed;
            inset: 0;
            z-index: 99;
            padding: 5px;
            font-size: 66px;
            font-weight: 500;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow-y: auto;
            text-align: left;
            box-sizing: border-box;
            overscroll-behavior: contain;
        }

        .information-wrapper {
            position: fixed;
            inset: 0;
            z-index: 100;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .information-wrapper.is-visible {
            visibility: visible;
            opacity: 1;
        }

        #info-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .yellow-bg {
            background-color: #FFFDCF;
        }
    </style>
</head>

<body>
    <div id="viewport">
        <div class="information-wrapper">
            <canvas id="info-background" width="1920" height="968"></canvas>
            <div id="information" class="information">
                <div>
                    <span class="color-box">Creative Producer</span>,
                    <span class="color-box">Stylist</span>,
                    <span class="color-box">Art Director</span>.<br><br>
                </div>
            </div>
        </div>

        <div class="ui-layer"><div></div></div>

        <div class="ui-layer__bottom">
            <div class="ui-layer__bottom__inner">
                <span class="btn-custom__background">Instagram</span>,
                <span class="btn-custom__background">Email</span>
            </div>
        </div>

        <div class="instructions">
            <div class="ui-layer__cat-navigation">
                <div class="title">© Mariia Kvasnevska</div>
                <div class="divider"></div>
                <div class="btn-custom__background"><div class="btn-custom__inner">Index</div></div>
                <div class="divider"></div>
                <div class="btn-custom__background"><div class="btn-custom__inner">Photography</div></div>
                <div class="divider"></div>
                <div class="btn-custom__background"><div class="btn-custom__inner">Video</div></div>
                <div class="divider"></div>
                <div class="btn-custom__background"><div class="btn-custom__inner">Events</div></div>
                <div class="divider"></div>
                <div id="information-btn" class="btn-custom__background"><div class="btn-custom__inner">About</div></div>
            </div>
        </div>

        <div id="world">
            <div class="world__inner">
                <div class="col-wrapper left-wrapper">
                    <div class="left">
                        <div class="world-image"><img src="images/1.png" draggable="false" alt="Work 1"></div>
                        <div class="world-image"><img src="images/n.webp" draggable="false" alt="Work 2"></div>
                        <div class="world-image"><img src="images/z.webp" draggable="false" alt="Work 3"></div>
                        <div class="world-image"><img src="images/x.webp" draggable="false" alt="Work 4"></div>
                        <div class="world-image"><img src="images/7.png" draggable="false" alt="Work 5"></div>
                        <div class="world-image"><img src="images/8.png" draggable="false" alt="Work 6"></div>
                    </div>
                </div>

                <div class="col-wrapper right-wrapper">
                    <div class="right">
                        <div class="world-image"><img src="images/zxc.gif" draggable="false" alt="Work 7"></div>
                        <div class="world-image"><img src="images/xxz.gif" draggable="false" alt="Work 8"></div>
                        <div class="world-image"><img src="images/mmmm.JPG" draggable="false" alt="Work 9"></div>
                        <div class="world-image"><img src="images/se.gif" draggable="false" alt="Work 10"></div>
                        <div class="world-image"><img src="images/vv.JPG" draggable="false" alt="Work 11"></div>
                        <div class="world-image"><img src="images/qqq.jpg" draggable="false" alt="Work 12"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const infoCanvas = document.getElementById('info-background');
        const ictx = infoCanvas.getContext('2d');
        const $ = query => document.querySelector(query);
        const $$ = query => document.querySelectorAll(query);

        const infoBtn = $("#information-btn");
        const infoBlock = $("#information");
        const infoWrap = $(".information-wrapper");
        const lWrap = $(".left-wrapper");
        const rWrap = $(".right-wrapper");

        let isInfoOpen = false;

        infoBlock.onclick = () => {
            infoWrap.classList.remove("is-visible");
            isInfoOpen = false;
        };
        infoWrap.onclick = e => e.stopPropagation();
        infoBtn.onclick = () => {
            infoWrap.classList.add("is-visible");
            isInfoOpen = true;
        };

        let currentLScroll = 0;
        let currentRScroll = 0;
        let targetLScroll = 0;
        let targetRScroll = 0;
        let activeCol = 'left';

        lWrap.addEventListener("mouseenter", () => { activeCol = 'left'; });
        rWrap.addEventListener("mouseenter", () => { activeCol = 'right'; });
        lWrap.addEventListener("touchstart", () => { activeCol = 'left'; }, { passive: true });
        rWrap.addEventListener("touchstart", () => { activeCol = 'right'; }, { passive: true });

        lWrap.addEventListener("scroll", () => {
            if (activeCol !== 'left') return;
            targetLScroll = lWrap.scrollTop;
            currentLScroll = lWrap.scrollTop;
            targetRScroll = targetLScroll;
        }, { passive: true });

        rWrap.addEventListener("scroll", () => {
            if (activeCol !== 'right') return;
            targetRScroll = rWrap.scrollTop;
            currentRScroll = rWrap.scrollTop;
            targetLScroll = targetRScroll;
        }, { passive: true });

        (function renderLoop() {
            if (!isInfoOpen) {
                const ease = 0.07;

                let diffL = targetLScroll - currentLScroll;
                if (Math.abs(diffL) > 0.1) {
                    currentLScroll += diffL * ease;
                    if (activeCol !== 'left') lWrap.scrollTop = currentLScroll;
                } else {
                    currentLScroll = targetLScroll;
                }

                let diffR = targetRScroll - currentRScroll;
                if (Math.abs(diffR) > 0.1) {
                    currentRScroll += diffR * ease;
                    if (activeCol !== 'right') rWrap.scrollTop = currentRScroll;
                } else {
                    currentRScroll = targetRScroll;
                }
            }

            requestAnimationFrame(renderLoop);
        })();

        let activeHoverId = null;
        const toggleImageState = (el, isActive) => {
            if (!el) return;
            const id = el.dataset.id;

            if (isActive) {
                $$('.world-image.is-active').forEach(activeNode => {
                    if (activeNode.dataset.id !== id) activeNode.classList.remove('is-active');
                });
                if (id) {
                    $$(`.world-image[data-id="${id}"]`).forEach(n => n.classList.add("is-active"));
                } else {
                    el.classList.add("is-active");
                }
                activeHoverId = id || el;
                const newSrc = el.querySelector("img").getAttribute("src");

                if (cursorImg.getAttribute("src") !== newSrc) {
                    cursor.classList.remove("visible");
                    cursorImg.onload = () => {
                        if (activeHoverId === (id || el)) cursor.classList.add("visible");
                    };
                    cursorImg.setAttribute("src", newSrc);
                } else {
                    cursor.classList.add("visible");
                }
            } else {
                if (id) {
                    $$(`.world-image[data-id="${id}"]`).forEach(n => n.classList.remove("is-active"));
                } else {
                    el.classList.remove("is-active");
                }
                if (activeHoverId === (id || el)) {
                    cursor.classList.remove("visible");
                    activeHoverId = null;
                    setTimeout(() => {
                        if (!activeHoverId) cursorImg.setAttribute("src", "");
                    }, 200);
                }
            }
        };

        $("#world").addEventListener("mouseover", e => {
            const target = e.target.closest(".world-image");
            if (!target) return;
            const related = e.relatedTarget;
            if (related && target.contains(related)) return;
            toggleImageState(target, true);
        });

        $("#world").addEventListener("mouseout", e => {
            const target = e.target.closest(".world-image");
            if (!target) return;
            const related = e.relatedTarget;
            if (related && target.contains(related)) return;
            if (related && (related.closest('.instructions') || related.closest('.ui-layer__bottom') || related.closest('.ui-layer'))) return;
            toggleImageState(target, false);
        });

        $$('.instructions, .ui-layer__bottom, .ui-layer').forEach(menu => {
            menu.addEventListener('mouseleave', e => {
                const related = e.relatedTarget;
                if (related && (related.closest('.world-image') || related.closest('.instructions') || related.closest('.ui-layer__bottom') || related.closest('.ui-layer'))) return;
                if (activeHoverId) {
                    const activeEl = document.querySelector('.world-image.is-active');
                    if (activeEl) toggleImageState(activeEl, false);
                }
            });
        });

        function drawGradient() {
            const cx = infoCanvas.width / 2;
            const cy = infoCanvas.height / 2;
            const radius = Math.max(infoCanvas.width, infoCanvas.height) / 1;
            const gradient = ictx.createRadialGradient(cx, cy, 0, cx, cy, radius);

            gradient.addColorStop(0, "#F61D3D");
            gradient.addColorStop(0.1, "#F61D3D");
            gradient.addColorStop(0.2, "#F61D3D");
            gradient.addColorStop(1, "#F61D3D");

            ictx.fillStyle = gradient;
            ictx.fillRect(0, 0, infoCanvas.width, infoCanvas.height);
        }

        function resizeCanvas() {
            infoCanvas.width = window.innerWidth;
            infoCanvas.height = window.innerHeight;
            drawGradient();
        }

        window.addEventListener('resize', resizeCanvas);
        infoBtn.addEventListener('click', resizeCanvas);
    </script>

</body></html>
