<!doctype html>

<html lang="ru">
    <head>
        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>MASHA DEV</title>

        <style>
            @font-face {
                font-family: "fOnT";
                src: url("font/KTF2101-Bold.otf") format("opentype");
                font-weight: normal;
                font-style: normal;
            }

            body,
            html {
                margin: 0;
                padding: 0;
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                background-color: #ffffff;
                font-family: "fOnT", system-ui, Helvetica, sans-serif;
                font-size: 11px;
                font-weight: 500;
                color: black;
            }

            .logo {
                font-weight: 500;
            }

            img{
                height: 45vh !important;
            }

            #viewport {
                width: 100%;
                height: 100vh;
                position: relative;
                cursor: default;
                overflow: hidden;
            }

            #viewport:active {
                cursor: default;
            }

            #world {
                position: absolute;
                inset: 0;
                will-change: transform;
                width: 100%;
                overflow: hidden;
            }

            .world__inner {
                position: relative;
                width: 100%;
                height: 100%;
            }

            .col-wrapper {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                overflow-y: auto;
                overflow-x: hidden;
                pointer-events: none;
                scrollbar-gutter: stable;
            }

            .left-wrapper {
                z-index: 1;
            }

            .title-grey {
                color: rgba(200, 200, 200, 1);
            }

            .right-wrapper {
                z-index: 1;
            }

            .left {
                width: 50%;
                margin-right: 50%;
                pointer-events: auto;
                display: grid;
                gap: 5px;
                padding: 5px;
                box-sizing: border-box;
                min-height: 100%;
            }

            .right {
                width: 50%;
                margin-left: 50%;
                pointer-events: auto;
                display: grid;
                gap: 5px;
                padding: 5px;
                box-sizing: border-box;
                min-height: 100%;
            }

            .col-wrapper::-webkit-scrollbar {
                width: 6px;
            }

            .col-wrapper::-webkit-scrollbar-track {
                background: transparent;
            }

            .col-wrapper::-webkit-scrollbar-thumb {
                background: rgba(0, 0, 0, 0.25);
                border-radius: 3px;
            }

            .col-wrapper {
                scrollbar-width: thin;
                scrollbar-color: rgba(0, 0, 0, 0.25) transparent;
            }

            .world-image {
                position: relative;
                user-select: none;
                -webkit-user-drag: none;
                will-change: transform, z-index;
                cursor: pointer;
                z-index: 1;
                height: fit-content;
                width: fit-content;
                display: flex;
                flex-direction: column;
                transition: scale 0.05s linear;
            }

            .world-image:hover > img {
                scale: 1.1;
            }
            .world-image > img {
                transition: scale 0.2s linear;
            }

            .ui-layer {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                z-index: 3;
                padding: 5px;
                pointer-events: none;
            }

            .ui-layer__cat-navigation {
                display: flex;
                flex-direction: column;
                gap: 2.5px;
            }

            .ui-layer__cat-navigation__inline {
                display: flex;
                flex-direction: row;
                gap: 2.5px;
            }

            .ui-layer__cat-navigation__inline > div {
                height: fit-content;
                pointer-events: auto;
            }

            .world-image__desc {
                z-index: 2;
                display: flex;
                gap: 3px;
                position: absolute;
                left: -10px;
                bottom: -17px;
                pointer-events: none;
                white-space: nowrap;
            }

            .world-image__desc .btn-custom__background {
                visibility: hidden;
                opacity: 0;
                transform: translateY(15px);
                transition:
                    transform 0.2s ease,
                    opacity 0.2s ease,
                    visibility 0.2s;
            }

            .world-image:hover .world-image__desc .btn-custom__background {
                visibility: visible;
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
            }

            .world-image:hover
                .world-image__desc
                .btn-custom__background:nth-child(1) {
                transition-delay: 0s;
            }

            .world-image:hover
                .world-image__desc
                .btn-custom__background:nth-child(2) {
                transition-delay: 0.1s;
            }

            .world-image:hover
                .world-image__desc
                .btn-custom__background:nth-child(3) {
                transition-delay: 0.2s;
            }

            .world-image:hover
                .world-image__desc
                .btn-custom__background:nth-child(4) {
                transition-delay: 0.3s;
            }

            .world-image:hover
                .world-image__desc
                .btn-custom__background:nth-child(5) {
                transition-delay: 0.4s;
            }

            .btn-custom__background {
                background-color: rgba(245, 245, 245, 0.1);
                width: fit-content;
                padding: 2.5px;
                backdrop-filter: blur(5px);
                cursor: pointer;
                pointer-events: auto;
            }

            .btn-custom__inner {
                background-color: rgba(245, 245, 245, 1);
                padding: 5px 10px;
            }

            .instractions {
                padding: 5px;
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 10;
                pointer-events: none;
                color: rgba(200, 200, 200, 1);
            }

            .instractions:hover{
                color: black;
            }

            .instractions__line-x {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 0;
                pointer-events: none;
                width: 1px;
                background-color: rgba(245, 245, 245, 1);
                height: 100%;
            }

            .instractions__line-y {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 0;
                pointer-events: none;
                width: 100%;
                background-color: rgba(245, 245, 245, 1);
                height: 1px;
            }


            .col-wrapper::-webkit-scrollbar {
                width: 6px;
            }

            .col-wrapper::-webkit-scrollbar-track {
                background: transparent;
            }

            .col-wrapper::-webkit-scrollbar-thumb {
                background: rgba(0, 0, 0, 0.25);
                border-radius: 3px;
            }

            .col-wrapper {
                scrollbar-width: thin;
                scrollbar-color: rgba(0, 0, 0, 0.25) transparent;
            }

            .col-wrapper::-webkit-scrollbar {
                display: none;
            }

            .col-wrapper {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            .title {
                color: rgba(205, 205, 205, 1);
                padding: 2.5px;
            }
        </style>
    </head>

    <body>
        <div id="viewport">
            <div class="ui-layer">
                <div class="ui-layer__cat-navigation">
                    <div class="title">Categories</div>
                    <div class="btn-custom__background">
                        <div class="btn-custom__inner">Video</div>
                    </div>
                    <div class="btn-custom__background">
                        <div class="btn-custom__inner">Photography</div>
                    </div>
                    <div class="btn-custom__background">
                        <div class="btn-custom__inner">Events</div>
                    </div>

                    <div class="pt ui-layer__cat-navigation">
                        <div class="title">Explore</div>
                        <div class="btn-custom__background">
                            <div class="btn-custom__inner">Archive</div>
                        </div>
                        <div class="btn-custom__background">
                            <div class="btn-custom__inner">About</div>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="title">Contact</div>
                    <div class="ui-layer__cat-navigation">
                        <div class="btn-custom__background">
                            <div class="btn-custom__inner">E-mail</div>
                        </div>
                        <div class="btn-custom__background">
                            <div class="btn-custom__inner">Instagram</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="instractions">© Mariia Kvasnevska</div>

            <div class="instractions__line-x"></div>

            <div class="instractions__line-y"></div>

            <div id="world">
                <div class="world__inner">
                    <div class="col-wrapper left-wrapper">
                        <div class="left">
                            <div class="world-image">
                                <img
                                    src="images/z.webp"
                                    draggable="false"
                                />

                                <div class="world-image__desc"></div>
                            </div>

                            <div class="world-image">
                                <img
                                    src="images/x.webp"
                                    draggable="false"
                                />
                            </div>

                            <div class="world-image">
                                <img
                                    src="images/м.webp"
                                    draggable="false"
                                />
                            </div>


                            <div class="world-image">
                                <img
                                    src="images/7.png"
                                    draggable="false"
                                />
                            </div>
                        </div>
                    </div>

                    <div class="col-wrapper right-wrapper">
                        <div class="right">
                            <div class="world-image">
                                <img
                                    src="images/8.png"
                                    draggable="false"
                                />
                            </div>

                            <div class="world-image">
                                <img
                                    src="images/2.png"
                                    draggable="false"
                                />
                            </div>

                            <div class="world-image">
                                <img
                                    src="images/1.png"
                                    draggable="false"
                                />
                                <div class="world-image__desc"></div>
                            </div>

                            <div class="world-image">
                                <img
                                    src="images/n.webp"
                                    draggable="false"
                                />
                            </div>

                            <div class="world-image">
                                <img
                                    src="images/5.png"
                                    draggable="false"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const images = document.querySelectorAll(".world-image");

            const imageStates = new Map();

            window.addEventListener("load", () => {
                images.forEach((img) => {
                    const parent = img.parentElement;

                    const parentWidth = parent.clientWidth;

                    const imgWidth = img.clientWidth;

                    const maxShift = parentWidth - imgWidth - 10;

                    if (maxShift > 0) {
                        const randomX = Math.random() * maxShift;

                        img.style.left = `${randomX}px`;
                    }
                });
            });

            images.forEach((img) => {
                imageStates.set(img, {
                    currentX: 0,
                    currentY: 0,

                    targetX: 0,
                    targetY: 0,

                    pushX: 0,
                    pushY: 0,

                    isHovered: false,
                });

                img.addEventListener("mouseenter", () => {
                    imageStates.get(img).isHovered = true;

                    img.style.zIndex = 2;
                });

                img.addEventListener("mousemove", (e) => {
                    const state = imageStates.get(img);

                    if (!state.isHovered) return;

                    const rect = img.getBoundingClientRect();

                    const centerX = rect.left + rect.width / 2;

                    const centerY = rect.top + rect.height / 2;

                    const offsetX = e.clientX - centerX;

                    const offsetY = e.clientY - centerY;

                    const strength = 0.3;

                    state.targetX = offsetX * strength;

                    state.targetY = offsetY * strength;
                });

                img.addEventListener("mouseleave", () => {
                    const state = imageStates.get(img);

                    state.isHovered = false;

                    state.targetX = 0;

                    state.targetY = 0;

                    img.style.zIndex = 1;
                });
            });

            function animateMagneticEffect() {
                images.forEach((img) => {
                    imageStates.get(img).pushX = 0;

                    imageStates.get(img).pushY = 0;
                });

                const rects = Array.from(images).map((img) => {
                    const rect = img.getBoundingClientRect();

                    return {
                        img: img,

                        width: rect.width + 5,

                        height: rect.height + 5,

                        centerX: rect.left + rect.width / 2,

                        centerY: rect.top + rect.height / 2,

                        isHovered: imageStates.get(img).isHovered,
                    };
                });

                for (let i = 0; i < rects.length; i++) {
                    for (let j = i + 1; j < rects.length; j++) {
                        const a = rects[i];

                        const b = rects[j];

                        const dx = b.centerX - a.centerX;

                        const dy = b.centerY - a.centerY;

                        const overlapX = (a.width + b.width) / 2 - Math.abs(dx);

                        const overlapY =
                            (a.height + b.height) / 2 - Math.abs(dy);

                        if (overlapX > 0 && overlapY > 0) {
                            const overlap = Math.min(overlapX, overlapY);

                            const force = overlap * 4;

                            let angle = Math.atan2(dy, dx);

                            if (dx === 0 && dy === 0)
                                angle = Math.random() * Math.PI * 2;

                            const forceX = Math.cos(angle) * force;

                            const forceY = Math.sin(angle) * force;

                            const stateA = imageStates.get(a.img);

                            const stateB = imageStates.get(b.img);

                            if (!a.isHovered) {
                                stateA.pushX -= forceX;

                                stateA.pushY -= forceY;
                            }

                            if (!b.isHovered) {
                                stateB.pushX += forceX;

                                stateB.pushY += forceY;
                            }
                        }
                    }
                }

                images.forEach((img) => {
                    const state = imageStates.get(img);

                    let finalTargetX = state.targetX + state.pushX;

                    let finalTargetY = state.targetY + state.pushY;

                    let dx = finalTargetX - state.currentX;

                    let dy = finalTargetY - state.currentY;

                    if (Math.abs(dx) > 0.05 || Math.abs(dy) > 0.05) {
                        state.currentX += dx * 0.1;

                        state.currentY += dy * 0.1;

                        img.style.transform = `translate(${state.currentX}px, ${state.currentY}px)`;
                    } else if (
                        state.currentX !== finalTargetX ||
                        state.currentY !== finalTargetY
                    ) {
                        state.currentX = finalTargetX;

                        state.currentY = finalTargetY;

                        img.style.transform = `translate(${state.currentX}px, ${state.currentY}px)`;
                    }
                });

                requestAnimationFrame(animateMagneticEffect);
            }

            animateMagneticEffect();

            const leftWrapper = document.querySelector(".left-wrapper");
            const rightWrapper = document.querySelector(".right-wrapper");

            let lastLeftScroll = leftWrapper.scrollTop;
            let lastRightScroll = rightWrapper.scrollTop;
            let isSyncing = false;

            const scrollSpeedFactor = 0.1;

            const handleScroll = (source, target, lastScrollKey) => {
                if (isSyncing) return;
                isSyncing = true;

                const currentScroll = source.scrollTop;
                const delta = currentScroll - (lastScrollKey === 'left' ? lastLeftScroll : lastRightScroll);

                target.scrollTop -= delta * scrollSpeedFactor;

                lastLeftScroll = leftWrapper.scrollTop;
                lastRightScroll = rightWrapper.scrollTop;

                requestAnimationFrame(() => {
                    isSyncing = false;
                });
            };

            leftWrapper.addEventListener("scroll", () => {
                handleScroll(leftWrapper, rightWrapper, 'left');
            }, { passive: true });

            rightWrapper.addEventListener("scroll", () => {
                handleScroll(rightWrapper, leftWrapper, 'right');
            }, { passive: true });

            const leftCol = document.querySelector(".left");
            const rightCol = document.querySelector(".right");

            leftCol.addEventListener("mouseenter", () => {
                leftWrapper.style.zIndex = "2";
                rightWrapper.style.zIndex = "1";
            });

            rightCol.addEventListener("mouseenter", () => {
                rightWrapper.style.zIndex = "2";
                leftWrapper.style.zIndex = "1";
            });
        </script>
    </body>
</html>
