<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MASHA DEV</title>
        <style>
            @font-face {
                font-family: "fOnT";
                src: url("font/KTF2101-Bold.otf") format("opentype");
                font-weight: normal;
                font-style: normal;
            }

            body, html {
                margin: 0;
                padding: 0;
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                background-color: #ffffff;
                font-family: "fOnT", system-ui, Helvetica, sans-serif;
                font-size: 11px;
                font-weight: 500;
                color: black;
            }

            .logo { font-weight: 500; }

            img { height: 47vh !important; }

            #viewport {
                width: 100%;
                height: 100vh;
                position: relative;
                cursor: default;
                overflow: hidden;
            }

            #viewport:active { cursor: default; }

            #world {
                position: absolute;
                inset: 0;
                will-change: transform;
                width: 100%;
                overflow: hidden;
            }

            .world__inner {
                position: relative;
                width: 100%;
                height: 100%;
            }

            .col-wrapper {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                overflow-y: auto;
                overflow-x: hidden;
                pointer-events: none;
                scrollbar-gutter: stable;
                overscroll-behavior: none;
            }

            .left-wrapper { z-index: 1; direction: rtl; }
            .right-wrapper { z-index: 1; direction: ltr; }
            .title-grey { color: rgba(200, 200, 200, 1); }

            .left {
                direction: ltr;
                width: 50%;
                margin-right: 50%;
                pointer-events: auto;
                display: flex;
                flex-direction: column;
                gap: 5px;
                padding: 5px;
                box-sizing: border-box;
            }

            .right {
                width: 50%;
                margin-left: 50%;
                pointer-events: auto;
                display: flex;
                flex-direction: column;
                gap: 5px;
                padding: 5px;
                box-sizing: border-box;
            }

            @media (pointer: coarse), (max-width: 1024px) {
                .col-wrapper {
                    width: 50%;
                    pointer-events: auto;
                }
                .left-wrapper { left: 0; direction: ltr; }
                .right-wrapper { left: 50%; }

                .left { width: 100%; margin: 0; }
                .right { width: 100%; margin: 0; }

                /* Заменили :hover на .is-active для мобильных */
                .world-image.is-active > img { scale: 1 !important; }
            }

            .col-wrapper::-webkit-scrollbar { display: none; }
            .col-wrapper { -ms-overflow-style: none; scrollbar-width: none; }

            .world-image {
                position: relative;
                user-select: none;
                -webkit-user-drag: none;
                will-change: transform, z-index;
                cursor: pointer;
                z-index: 1;
                height: fit-content;
                width: fit-content;
                display: flex;
                flex-direction: column;
            }

            /* Заменили все :hover на класс .is-active */
            .world-image.is-active > img { scale: 1.1; }
            .world-image > img { transition: scale 0.2s linear; }

            .ui-layer {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                z-index: 3;
                padding: 5px;
                pointer-events: none;
            }

            .ui-layer__cat-navigation { display: flex; flex-direction: column; gap: 2.5px; }
            .ui-layer__cat-navigation__inline { display: flex; flex-direction: row; gap: 2.5px; }
            .ui-layer__cat-navigation__inline > div { height: fit-content; pointer-events: auto; }

            .world-image__desc {
                z-index: 2; display: flex; gap: 3px; position: absolute;
                left: -10px; bottom: -17px; pointer-events: none; white-space: nowrap;
            }

            .world-image__desc .btn-custom__background {
                visibility: hidden; opacity: 0; transform: translateY(15px);
                transition: transform 0.2s ease, opacity 0.2s ease, visibility 0.2s;
            }

            /* Заменили :hover на класс .is-active */
            .world-image.is-active .world-image__desc .btn-custom__background {
                visibility: visible; opacity: 1; transform: translateY(0); pointer-events: auto;
            }

            .world-image.is-active .world-image__desc .btn-custom__background:nth-child(1) { transition-delay: 0s; }
            .world-image.is-active .world-image__desc .btn-custom__background:nth-child(2) { transition-delay: 0.1s; }
            .world-image.is-active .world-image__desc .btn-custom__background:nth-child(3) { transition-delay: 0.2s; }
            .world-image.is-active .world-image__desc .btn-custom__background:nth-child(4) { transition-delay: 0.3s; }
            .world-image.is-active .world-image__desc .btn-custom__background:nth-child(5) { transition-delay: 0.4s; }

            .btn-custom__background {
                background-color: rgba(245, 245, 245, 0.1); width: fit-content; padding: 2.5px;
                backdrop-filter: blur(5px); cursor: pointer; pointer-events: auto;
                mix-blend-mode: difference;
            }

            .btn-custom__inner { background-color: rgba(245, 245, 245, 1); padding: 5px 10px; }

            .instractions {
                padding: 5px; position: fixed; top: 50%; left: 50%;
                transform: translate(-50%, -50%); z-index: 10;
                pointer-events: none; color: rgba(200, 200, 200, 1);
            }

            .instractions:hover { color: black; }

            .instractions__line-x {
                position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                z-index: 0; pointer-events: none; width: 1px; background-color: rgba(245, 245, 245, 1); height: 100%;
            }

            .instractions__line-y {
                position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                z-index: 0; pointer-events: none; width: 100%; background-color: rgba(245, 245, 245, 1); height: 1px;
            }

            .title { color: rgba(205, 205, 205, 1); padding: 2.5px; }

            .pt { padding-top: 5px; }
        </style>
    </head>

    <body>
        <div id="viewport">
            <div class="ui-layer">
                <div class="ui-layer__cat-navigation">
                    <div class="title">Categories</div>
                    <div class="btn-custom__background"><div class="btn-custom__inner">Video</div></div>
                    <div class="btn-custom__background"><div class="btn-custom__inner">Photography</div></div>
                    <div class="btn-custom__background"><div class="btn-custom__inner">Exhibitions</div></div>

                    <div class="pt ui-layer__cat-navigation">
                        <div class="title">Explore</div>
                        <div class="btn-custom__background"><div class="btn-custom__inner">Archive</div></div>
                        <div class="btn-custom__background"><div class="btn-custom__inner">Information</div></div>
                    </div>
                </div>

                <div>
                    <div class="title">Contact</div>
                    <div class="ui-layer__cat-navigation">
                        <div class="btn-custom__background"><div class="btn-custom__inner">E-mail</div></div>
                        <div class="btn-custom__background"><div class="btn-custom__inner">Instagram</div></div>
                    </div>
                </div>
            </div>

            <div class="instractions">© Mariia Kvasnevska</div>
            <div class="instractions__line-x"></div>

            <div id="world">
                <div class="world__inner">
                    <div class="col-wrapper left-wrapper">
                        <div class="left">
                            <div class="world-image">
                                <img src="images/z.webp" draggable="false" />
                                <div class="world-image__desc"></div>
                            </div>
                            <div class="world-image"><img src="images/x.webp" draggable="false" /></div>
                            <div class="world-image"><img src="images/м.webp" draggable="false" /></div>
                            <div class="world-image"><img src="images/7.png" draggable="false" /></div>
                        </div>
                    </div>

                    <div class="col-wrapper right-wrapper">
                        <div class="right">
                            <div class="world-image"><img src="images/8.png" draggable="false" /></div>
                            <div class="world-image"><img src="images/2.png" draggable="false" /></div>
                            <div class="world-image">
                                <img src="images/1.png" draggable="false" />
                                <div class="world-image__desc"></div>
                            </div>
                            <div class="world-image"><img src="images/n.webp" draggable="false" /></div>
                            <div class="world-image"><img src="images/5.png" draggable="false" /></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const imageStates = new WeakMap();
            const imagesList = [];

            const groupTimeouts = {};

            function initImage(el) {
                if (imageStates.has(el)) return;

                imagesList.push(el);
                imageStates.set(el, {
                    currentX: 0, currentY: 0,
                    targetX: 0,  targetY: 0,
                    pushX: 0,    pushY: 0,
                    isHovered: false,
                    lastRenderX: null, lastRenderY: null,
                });

                el.addEventListener("mouseenter", () => {
                    const groupId = el.getAttribute('data-id');

                    clearTimeout(groupTimeouts[groupId]);

                    document.querySelectorAll(`.world-image[data-id="${groupId}"]`).forEach(node => {
                        node.classList.add('is-active');
                        node.style.zIndex = 2;

                        if (imageStates.has(node)) {
                            imageStates.get(node).isHovered = true;
                        }
                    });
                });

                el.addEventListener("mousemove", (e) => {
                    const state = imageStates.get(el);
                    if (!state.isHovered) return;
                    const rect = el.getBoundingClientRect();
                    state.targetX = (e.clientX - (rect.left + rect.width / 2)) * 0.3;
                    state.targetY = (e.clientY - (rect.top + rect.height / 2)) * 0.3;
                });

                el.addEventListener("mouseleave", () => {
                    const groupId = el.getAttribute('data-id');

                    groupTimeouts[groupId] = setTimeout(() => {
                        document.querySelectorAll(`.world-image[data-id="${groupId}"]`).forEach(node => {
                            node.classList.remove('is-active');
                            node.style.zIndex = 1;

                            if (imageStates.has(node)) {
                                const state = imageStates.get(node);
                                state.isHovered = false;
                                state.targetX = 0;
                                state.targetY = 0;
                            }
                        });
                    }, 50);
                });
            }

            function animateMagneticEffect() {
                imagesList.forEach(el => {
                    const s = imageStates.get(el);
                    s.pushX = 0;
                    s.pushY = 0;
                });

                const rects = imagesList.map((el) => {
                    const rect = el.getBoundingClientRect();
                    return {
                        el,
                        width:    rect.width + 5,
                        height:   rect.height + 5,
                        centerX:  rect.left + rect.width / 2,
                        centerY:  rect.top  + rect.height / 2,
                        isHovered: imageStates.get(el).isHovered,
                    };
                });

                for (let i = 0; i < rects.length; i++) {
                    for (let j = i + 1; j < rects.length; j++) {
                        const a = rects[i], b = rects[j];
                        const dx = b.centerX - a.centerX;
                        const dy = b.centerY - a.centerY;
                        const overlapX = (a.width  + b.width)  / 2 - Math.abs(dx);
                        const overlapY = (a.height + b.height) / 2 - Math.abs(dy);

                        if (overlapX > 0 && overlapY > 0) {
                            const force = Math.min(overlapX, overlapY) * 4;
                            let angle = (dx === 0 && dy === 0)
                                ? Math.random() * Math.PI * 2
                                : Math.atan2(dy, dx);
                            const forceX = Math.cos(angle) * force;
                            const forceY = Math.sin(angle) * force;

                            if (!a.isHovered) { imageStates.get(a.el).pushX -= forceX; imageStates.get(a.el).pushY -= forceY; }
                            if (!b.isHovered) { imageStates.get(b.el).pushX += forceX; imageStates.get(b.el).pushY += forceY; }
                        }
                    }
                }

                imagesList.forEach((el) => {
                    const state = imageStates.get(el);
                    const finalX = state.targetX + state.pushX;
                    const finalY = state.targetY + state.pushY;
                    const dx = finalX - state.currentX;
                    const dy = finalY - state.currentY;

                    if (Math.abs(dx) > 0.1 || Math.abs(dy) > 0.1) {
                        state.currentX += dx * 0.1;
                        state.currentY += dy * 0.1;
                    } else {
                        state.currentX = finalX;
                        state.currentY = finalY;
                    }

                    let renderX = Math.round(state.currentX * 100) / 100;
                    let renderY = Math.round(state.currentY * 100) / 100;
                    if (Math.abs(renderX) < 0.2) renderX = 0;
                    if (Math.abs(renderY) < 0.2) renderY = 0;

                    if (state.lastRenderX !== renderX || state.lastRenderY !== renderY) {
                        el.style.transform = `translate(${renderX}px, ${renderY}px)`;
                        state.lastRenderX = renderX;
                        state.lastRenderY = renderY;
                    }
                });

                requestAnimationFrame(animateMagneticEffect);
            }

            const leftWrapper  = document.querySelector(".left-wrapper");
            const rightWrapper = document.querySelector(".right-wrapper");
            const leftGrid     = document.querySelector(".left");
            const rightGrid    = document.querySelector(".right");

            let leftOriginalHeight  = 0;
            let rightOriginalHeight = 0;

            function setupInfiniteScroll(wrapper, grid) {
                const originalItems = Array.from(grid.querySelectorAll(".world-image"));

                originalItems.forEach((item, index) => {
                    item.setAttribute('data-id', wrapper.className.split(' ')[1] + '-' + index);

                    const maxShift = grid.clientWidth - item.clientWidth - 10;
                    if (maxShift > 0) item.style.left = `${Math.random() * maxShift}px`;
                    initImage(item);
                });

                function appendCloneSet() {
                    originalItems.forEach((item) => {
                        const clone = item.cloneNode(true);
                        grid.appendChild(clone);
                        initImage(clone);
                    });
                }

                appendCloneSet();
                appendCloneSet();

                return grid.scrollHeight / 3;
            }

            let lastLeftScroll  = 0;
            let lastRightScroll = 0;
            let isSyncing = false;
            const scrollSpeedFactor = 0.15;

            function handleScroll(sourceWrapper, targetWrapper, sourceOrigHeight, targetOrigHeight, isLeft) {
                if (isSyncing) return;

                let currentScroll = sourceWrapper.scrollTop;
                let lastScroll    = isLeft ? lastLeftScroll : lastRightScroll;

                if (currentScroll < sourceOrigHeight * 0.5) {
                    sourceWrapper.scrollTop = currentScroll + sourceOrigHeight;
                    currentScroll += sourceOrigHeight;
                    lastScroll    += sourceOrigHeight;
                } else if (currentScroll > sourceOrigHeight * 1.5) {
                    sourceWrapper.scrollTop = currentScroll - sourceOrigHeight;
                    currentScroll -= sourceOrigHeight;
                    lastScroll    -= sourceOrigHeight;
                }

                const delta = currentScroll - lastScroll;
                if (isLeft) lastLeftScroll = currentScroll;
                else        lastRightScroll = currentScroll;

                if (Math.abs(delta) > 0 && Math.abs(delta) < window.innerHeight) {
                    isSyncing = true;
                    targetWrapper.scrollTop += delta * scrollSpeedFactor;

                    let targetScroll = targetWrapper.scrollTop;
                    if (targetScroll < targetOrigHeight * 0.5) {
                        targetWrapper.scrollTop = targetScroll + targetOrigHeight;
                        targetScroll += targetOrigHeight;
                    } else if (targetScroll > targetOrigHeight * 1.5) {
                        targetWrapper.scrollTop = targetScroll - targetOrigHeight;
                        targetScroll -= targetOrigHeight;
                    }

                    if (isLeft) lastRightScroll = targetWrapper.scrollTop;
                    else        lastLeftScroll  = targetWrapper.scrollTop;

                    requestAnimationFrame(() => { isSyncing = false; });
                }
            }

            window.addEventListener("load", () => {
                leftOriginalHeight  = setupInfiniteScroll(leftWrapper,  leftGrid);
                rightOriginalHeight = setupInfiniteScroll(rightWrapper, rightGrid);

                leftWrapper.scrollTop  = leftOriginalHeight;
                rightWrapper.scrollTop = rightOriginalHeight;
                lastLeftScroll  = leftWrapper.scrollTop;
                lastRightScroll = rightWrapper.scrollTop;

                animateMagneticEffect();

                leftWrapper.addEventListener("scroll",  () => handleScroll(leftWrapper,  rightWrapper, leftOriginalHeight,  rightOriginalHeight, true),  { passive: true });
                rightWrapper.addEventListener("scroll", () => handleScroll(rightWrapper, leftWrapper,  rightOriginalHeight, leftOriginalHeight,  false), { passive: true });
            });

            const leftCol  = document.querySelector(".left");
            const rightCol = document.querySelector(".right");

            const setLeftActive  = () => { leftWrapper.style.zIndex  = "2"; rightWrapper.style.zIndex = "1"; };
            const setRightActive = () => { rightWrapper.style.zIndex = "2"; leftWrapper.style.zIndex  = "1"; };

            leftCol.addEventListener("mouseenter",  setLeftActive);
            rightCol.addEventListener("mouseenter", setRightActive);
            leftCol.addEventListener("touchstart",  setLeftActive,  { passive: true });
            rightCol.addEventListener("touchstart", setRightActive, { passive: true });
        </script>
    </body>
</html>
