<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mariia Kvasnevska</title>
        <style>
            @font-face {
                font-family: "fOnT";
                src: url("font/KTF2101-Bold.otf") format("opentype");
            }
            body, html {
                margin: 0;
                padding: 0;
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                overflow: hidden;
                background-color: white;
                font-family: Arial, system-ui, Helvetica, sans-serif;
                font-weight: 400;
                color: black;
                font-size: 14px;
                line-height: 1.15;
                letter-spacing: .01em;
            }
            img {
                height: 50vh;
                display: block;
            }
            video {
                height: 40vh;
                display: block;
            }
            #viewport {
                width: 100%;
                height: 100vh;
                height: 100dvh;
                position: relative;
                cursor: default;
                overflow: hidden;
            }
            #world, .world__inner, .col-wrapper {
                width: 100%;
                height: 100%;
                position: absolute;
                inset: 0;
            }
            .col-wrapper {
                overflow-y: auto;
                overflow-x: hidden;
                pointer-events: none;
                scrollbar-width: none;
                overscroll-behavior: none;

                transform: translateZ(0);
                will-change: transform;
            }
            .col-wrapper::-webkit-scrollbar {
                display: none;
            }
            .left-wrapper {
                z-index: 1;
            }
            .right-wrapper {
                z-index: 1;
            }
            .left, .right {
                width: 50%;
                pointer-events: auto;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 100px;
                padding: 10px;
                box-sizing: border-box;
            }
            .right {
                margin-left: 50%;
            }
            .world-image {
                position: relative;
                user-select: none;
                cursor:zoom-in;

                height: fit-content;
                width: fit-content;
                display: flex;
                flex-direction: column;
                z-index: 1;
                will-change: transform;
            }
            .world-image.returning {
                transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            }
            .world-image:hover {
                z-index: 2;
            }
            .image-desc {
                position: absolute;
                top: 5px;
                left: 5px;
                color: black;
                z-index: -1;
            }

            .grid-overlay {
                position: absolute;
                inset: 0;
                background-color: white;
                z-index: 80;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.6s cubic-bezier(.77,0,.175,1);
                will-change: opacity;
            }
            .grid-overlay.is-visible {
                opacity: 0.95;
                pointer-events: auto;
            }

            #cursor-image {
                position: fixed;
                top: 0;
                left: 0;
                pointer-events: none;
                z-index: 9;
                opacity: 0;
                transition: opacity 0.2s ease;
                will-change: transform, opacity;
            }
            #cursor-image.visible {
                opacity: 1;
            }
            #cursor-image img {
                display: block;
                box-shadow: none;
                filter: none;
                max-width: 100%;
            }
            #cursor-image img[src=""],
            #cursor-image img:not([src]) {
                visibility: hidden;
            }
            .ui-layer {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                display: grid;
                grid-template-columns: repeat(1, 1fr);
                z-index: 90;
                padding: 5px;
                text-align: center;
            }
            .ui-layer__bottom {
                position: fixed;
                bottom: 0;
                width: 100vw;
                display: flex;
                flex-direction: row;
                justify-content: center;
                gap: 5px;
                z-index: 90;
                padding: 5px;
                box-sizing: border-box;
                cursor: pointer;
                color: black;
                font-weight: 400;

                opacity: 1;
                transition: opacity 0.2s cubic-bezier(.77,0,.175,1);

            }

            .ui-layer__bottom.is-hidden {
                transition: opacity 0.2s cubic-bezier(.77,0,.175,1);
                opacity: 0;
            }

            .ui-layer__cat-navigation {
                display: flex;
                flex-direction: row;
                gap: 5px;
                justify-content: center;
                align-items: center;
                margin-inline: auto;
                transition: background-color 0.3s cubic-bezier(.77,0,.175,1);
            }
            .btn-custom__background {
                width: fit-content;
                pointer-events: auto;
                cursor: pointer;
                transition: color 0.3s cubic-bezier(.77,0,.175,1), padding 0.3s linear;
            }
            .btn-custom__background:hover {
                padding-left: 15px;
                padding-right: 15px;
                background-color: #F61D3D;
            }
            .btn-custom__inner {
                color: black;
            }
            .instructions {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 10;
                cursor: pointer;
                display: flex;

                transition: opacity 0.3s cubic-bezier(.77,0,.175,1);
                opacity: 1;
            }
            .instructions.is-hidden {
                opacity: 0;
            }
            .divider {
                padding-top: 2.5px;
                padding-bottom: 2.5px;
                width: 1px;
                height: 100%;
                background-color: black;
                pointer-events: none;
            }
            .title {
                color: black;
            }
            .color-box {
                background-color: #FFFDCF;
            }
            .information {
                position: fixed;
                inset: 0;
                z-index: 99;
                padding: 5px;
                font-size: 66px;
                font-weight: 400;
                height: 100vh;
                height: 100dvh;
                width: 100vw;
                overflow-y: auto;
                text-align: left;
                box-sizing: border-box;
                overscroll-behavior: contain;
            }
            .information-wrapper {
                position: fixed;
                inset: 0;
                z-index: 100;
                height: 100vh;
                height: 100dvh;
                width: 100vw;
                visibility: hidden;
                opacity: 0;
                transition: opacity 0.3s ease, visibility 0.3s ease;
            }
            .information-wrapper.is-visible {
                visibility: visible;
                opacity: 1;
            }
            #info-background {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vw;
                z-index: -1;
                pointer-events: none;
            }
            .yellow-bg {
                background-color: #FFFDCF;
            }
            #image-cursor-desc {
                position: fixed;
                top: 0;
                left: 0;
                pointer-events: none;
                z-index: 1000;
                opacity: 0;
                white-space: nowrap;
                background-color: #F61D3D;
                color: white;
                padding: 2px 8px;
                font-size: 11px;
                text-transform: uppercase;
                transition: opacity 0.3s ease;
                will-change: transform;
            }
            #image-cursor-desc.is-visible {
                opacity: 1;
            }
            #top-image-description {
                position: fixed;
                top: 0;
                padding: 5px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1000;

                visibility: hidden;
                pointer-events: none;
            }
            #top-image-description.is-visible {
                visibility: visible !important;
            }
            .view-image-wrapper{
                cursor: zoom-out;
                z-index: 89;
                position: relative;
                transform: translate3d(0, 110%, 0);
                transition: transform 0.6s cubic-bezier(.77,0,.175,1);
                will-change: transform;
            }
            .view-image-wrapper.is-visible {
                transform: translate3d(0, 0, 0);
            }
            .view-image{
                margin-inline: auto;
                height: 100vh;
                width: 100vw;
                cursor: auto;
                position: relative;
            }
            .view-image__text{
                position: fixed;
                bottom: 0;
                left: 0;
                opacity: 0;
                width: 100vw;
                z-index: 110;
            }
            .view-image__text__inner{
                width: fit-content;
                margin-inline: auto;
                text-align: left;
                display: flex;
                flex-direction: column;
                padding: 5px;
            }
            .view-image__text.is-visible{
                transition: opacity 0.2s cubic-bezier(.77,0,.175,1);
                opacity: 1;
            }

            .video-controls {
                display: none;
                position: absolute;
                /*top: 0;*/
                top: 50%;
                transform: translateY(-50%);
                justify-content: space-between;
                align-items: center;
                width: 100%;
                z-index: 110;
                opacity: 0;
            }
            .video-controls.is-visible {
                opacity: 1;
            }
            .video-controls > * {
                pointer-events: auto;
                cursor: pointer;
            }

            .opacity {
                opacity: 0.5;
            }
            .white-bg {
                background-color: white;
            }
            .red-bg {
                background-color: #F61D3D;
            }
            .mr{
                margin-right: 5px;
            }
            .video-controls__play-pause{
                margin-left: 5px;
                margin-right: 5px;
                transition: color 0.3s cubic-bezier(.77,0,.175,1), padding 0.3s linear;
            }
            .video-controls__play-pause:hover{
                padding-left: 15px;
                padding-right: 15px;
                background-color: #F61D3D;
            }
            .video-controls__less-more{
                margin-left: 5px;
                margin-right: 5px;
                transition: color 0.3s cubic-bezier(.77,0,.175,1), padding 0.3s linear;
            }
            .video-controls__less-more:hover{
                padding-left: 15px;
                padding-right: 15px;
                background-color: #FFFDCF;
            }
            .video-controls__sound{
                margin-left: 5px;
                margin-right: 5px;
                transition: color 0.3s cubic-bezier(.77,0,.175,1), padding 0.3s linear;
            }
            .video-controls__sound:hover{
                padding-left: 15px;
                padding-right: 15px;
                background-color: #FFFDCF;
            }
            .video-controls__time{
                display: flex;
                align-items: center;
                gap: 10px;
                margin-left: 5px;
                margin-right: 5px;
            }
            .video-controls__time-duration{
                color: rgba(0, 0, 0, 0.3);
            }
        </style>
    </head>

    <body>

            <!-- Главная сетка -->

        <script>
            const CLOUD_NAME = "dfzw4p8ez";
            const TAG_NAME = "portfolio";

            const gridOverlay = document.querySelector('.grid-overlay');

            async function loadGalleryFromCloudinary() {
                const videoUrl = `https://res.cloudinary.com/${CLOUD_NAME}/video/list/${TAG_NAME}.json`;
                const imageUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${TAG_NAME}.json`;

                try {
                    const [vRes, iRes] = await Promise.all([fetch(videoUrl), fetch(imageUrl)]);
                    const vData = await vRes.json();
                    const iData = await iRes.json();

                    const videoMedia = [
                        ...vData.resources.map(item => ({
                            type: 'video',
                            public_id: item.public_id,
                            version: item.version,
                            format: item.format,
                            context: item.context
                        })),
                    ];
                    const imageMedia = [
                        ...iData.resources.map(item => ({
                            type: 'image',
                            public_id: item.public_id,
                            version: item.version,
                            format: item.format,
                            context: item.context
                        })),
                    ];
                    const allMedia = [...videoMedia, ...imageMedia];
                    if (allMedia.length > 0) {
                        renderGallery(allMedia);
                    }
                } catch (err) {
                    console.error("API:", err);
                }
            }

            function renderGallery(items) {
                const leftCol = document.querySelector('.left');
                const rightCol = document.querySelector('.right');
                const topDescEl = document.querySelector('#top-image-description');

                items.forEach((item, index) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'world-image';

                    let content;
                    let mediaUrl;

                    if (item.type === 'video') {
                        mediaUrl = `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/${item.public_id}.${item.format}`;
                        content = `<video src="${mediaUrl}" autoplay muted loop playsinline draggable="false"></video>`;

                        wrapper.innerHTML = content;
                        leftCol.appendChild(wrapper);
                    } else {
                        mediaUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${item.public_id}.${item.format}`;
                        content = `<img src="${mediaUrl}" draggable="false">`;
                        wrapper.innerHTML = content;
                        rightCol.appendChild(wrapper);
                    }

                    const projectTag = item.context?.custom?.caption;

                    if (projectTag) {
                        wrapper.addEventListener('mouseenter', () => {
                            if (isViewerOpen) return;
                            topDescEl.textContent = projectTag;
                            topDescEl.classList.add('is-visible');
                        });

                        wrapper.addEventListener('mouseleave', () => {
                            topDescEl.classList.remove('is-visible');
                        });

                        wrapper.addEventListener('click', () => {
                            openProject(projectTag, item.type, mediaUrl);
                        });
                    } else {
                        wrapper.style.cursor = 'default';
                    }
                });
            }

            async function openProject(projectTag, initialType, initialUrl) {
                isViewerOpen = true;

                const viewImageWrapperLocal = document.querySelector('.view-image-wrapper');
                const viewImageTextLocal = document.querySelector('.view-image__text');
                const viewImageLocal = document.querySelector('.view-image');
                const controls = document.querySelector('.video-controls');

                document.querySelector('.project-title-ui').textContent = projectTag;

                if (initialType === 'video') {
                    controls.style.display = 'flex';
                    viewImageLocal.innerHTML = `<video id="viewer-main-vid" src="${initialUrl}" autoplay loop muted playsinline style="width:100%; height:100%; object-fit:contain;"></video>`;
                } else {
                    controls.style.display = 'none';
                    viewImageLocal.innerHTML = `<img id="viewer-main-img" src="${initialUrl}" style="width:100%; height:100%; object-fit:contain;">`;
                }

                document.querySelectorAll('#world video').forEach(v => v.pause());

                const videoUrl = `https://res.cloudinary.com/${CLOUD_NAME}/video/list/${projectTag}.json`;
                const imageUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${projectTag}.json`;

                try {
                    const [vRes, iRes] = await Promise.all([
                        fetch(videoUrl).then(r => r.ok ? r.json() : { resources: [] }),
                        fetch(imageUrl).then(r => r.ok ? r.json() : { resources: [] })
                    ]);

                    const projectFiles = [
                        ...vRes.resources.map(item => ({ ...item, type: 'video' })),
                        ...iRes.resources.map(item => ({ ...item, type: 'image' }))
                    ];

                    projectFiles.sort((a, b) => a.public_id.localeCompare(b.public_id));

                    if (projectFiles.length > 0) {
                        renderFileInViewer(projectFiles);
                    }

                } catch (err) {
                    console.error(err);
                }

                viewImageWrapperLocal.classList.add('is-visible');
                gridOverlay.classList.add('is-visible');

                // Вызываем появление элементов с задержкой 550 мс
                setTimeout(() => {
                    viewImageTextLocal.classList.add('is-visible');
                    // Если это видео - плавно показываем контролы вместе с текстом
                    if (controls.style.display === 'flex') {
                        controls.classList.add('is-visible');
                    }
                }, 550);

                startProgressLoop(); // Запускаем цикл проверки видео

                const instructionsLocal = document.querySelector('.instructions');
                const uiLayerBottomLocal = document.querySelector('.ui-layer__bottom');
                const topDescLocal = document.querySelector('#top-image-description');

                setTimeout(() => {
                    instructionsLocal.classList.add('is-hidden');
                }, 150);
                if(uiLayerBottomLocal){
                    uiLayerBottomLocal.classList.add('is-hidden');
                }
                if(topDescLocal){
                    topDescLocal.classList.remove('is-visible');
                }
            }

            let currentProjectFiles = [];
            let currentViewerIndex = 0;

            function renderFileInViewer(files) {
                currentProjectFiles = files;
                currentViewerIndex = 0;
                updateViewerFrame();
            }

            function updateViewerFrame() {
                const file = currentProjectFiles[currentViewerIndex];
                const totalCount = currentProjectFiles.length;

                if (totalCount === 1) {
                    document.querySelector('.view-counter').style.display = 'none';
                }

                document.querySelector('.view-counter').textContent = `${currentViewerIndex + 1}/${totalCount}`;

                const viewImageLocal = document.querySelector('.view-image');
                const controls = document.querySelector('.video-controls');
                const isTextVisible = document.querySelector('.view-image__text').classList.contains('is-visible');

                if (file.type === 'video') {
                    controls.style.display = 'flex';
                    if (isTextVisible) {
                        requestAnimationFrame(() => controls.classList.add('is-visible'));
                    }

                    const url = `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/q_auto,f_auto/${file.public_id}.${file.format}`;
                    let vidEl = document.getElementById('viewer-main-vid');
                    let imgEl = document.getElementById('viewer-main-img');

                    if (imgEl) imgEl.remove();

                    if (!vidEl) {
                        viewImageLocal.innerHTML = `<video id="viewer-main-vid" src="${url}" autoplay loop muted playsinline style="width:100%; height:100%; object-fit:contain;"></video>`;
                    } else {
                        if (!vidEl.src.includes(file.public_id)) {
                            vidEl.src = url;
                            vidEl.play();
                        }
                    }
                } else {
                    controls.classList.remove('is-visible');
                    controls.style.display = 'none';

                    const lowResUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_100,q_50,f_auto/${file.public_id}.${file.format}`;
                    const highResUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto,f_auto/${file.public_id}.${file.format}`;

                    let imgEl = document.getElementById('viewer-main-img');
                    let vidEl = document.getElementById('viewer-main-vid');

                    if (vidEl) vidEl.remove();

                    if (!imgEl) {
                        viewImageLocal.innerHTML = `<img id="viewer-main-img" src="${lowResUrl}" style="width:100%; height:100%; object-fit:contain;">`;
                        imgEl = document.getElementById('viewer-main-img');
                    } else {
                        if (!imgEl.src.includes(file.public_id)) {
                            imgEl.src = lowResUrl;
                        }
                    }

                    const hdImage = new Image();
                    hdImage.src = highResUrl;
                    hdImage.onload = () => {
                        if (currentProjectFiles[currentViewerIndex] === file) {
                            imgEl.src = highResUrl;
                        }
                    };
                }

                if (currentViewerIndex < currentProjectFiles.length - 1) {
                    const nextFile = currentProjectFiles[currentViewerIndex + 1];
                    if (nextFile.type === 'image') {
                        new Image().src = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto,f_auto/${nextFile.public_id}.${nextFile.format}`;
                    }
                }
                if (currentViewerIndex > 0) {
                    const prevFile = currentProjectFiles[currentViewerIndex - 1];
                    if (prevFile.type === 'image') {
                        new Image().src = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto,f_auto/${prevFile.public_id}.${prevFile.format}`;
                    }
                }
            }

            function formatTime(timeInSeconds) {
                if (isNaN(timeInSeconds)) return "0:00";
                // if (isNaN(timeInSeconds)) return "0:00:000";
                const minutes = Math.floor(timeInSeconds / 60);
                const seconds = Math.floor(timeInSeconds % 60);
                // const milliseconds = Math.floor((timeInSeconds % 1) * 1000);

                return `${minutes}:${seconds.toString().padStart(2, '0')}`;
                // return `${minutes}:${seconds.toString().padStart(2, '0')}:${milliseconds.toString().padStart(3, '0')}`;
            }

            let progressLoopId;

            function startProgressLoop() {
                function loop() {
                    const vid = document.getElementById('viewer-main-vid');
                    const progressBar = document.querySelector('.video-controls__progress-bar');
                    const btnPlay = document.querySelector('.video-controls__play-pause');
                    const btnSound = document.querySelector('.video-controls__sound');

                    const timeCurrent = document.querySelector('.video-controls__time-current');
                    const timeDuration = document.querySelector('.video-controls__time-duration');

                    if (vid && progressBar && btnPlay && btnSound) {
                        if (vid.duration) {
                            const percent = (vid.currentTime / vid.duration) * 100;
                            progressBar.style.width = percent + '%';

                            if (timeCurrent && timeDuration) {
                                timeCurrent.textContent = formatTime(vid.currentTime);
                                timeDuration.textContent = formatTime(vid.duration);
                            }
                        }
                        btnPlay.textContent = vid.paused ? 'Play' : 'Pause';
                        btnSound.textContent = vid.muted ? 'Unmute' : 'Mute';
                    }
                    progressLoopId = requestAnimationFrame(loop);
                }
                loop();
            }

            function stopProgressLoop() {
                cancelAnimationFrame(progressLoopId);
            }

            const videoControls = document.querySelector('.video-controls');
            const btnPlay = document.querySelector('.video-controls__play-pause');
            const btnSound = document.querySelector('.video-controls__sound');
            const progressWrap = document.querySelector('.video-controls__progress');
            const btnHide = document.querySelector('.video-controls__less-more');

            videoControls.addEventListener('click', e => e.stopPropagation());

            btnPlay.addEventListener('click', () => {
                const vid = document.getElementById('viewer-main-vid');
                if (!vid) return;
                vid.paused ? vid.play() : vid.pause();
            });

            btnSound.addEventListener('click', () => {
                const vid = document.getElementById('viewer-main-vid');
                if (!vid) return;
                vid.muted = !vid.muted;
            });

            progressWrap.addEventListener('click', (e) => {
                const vid = document.getElementById('viewer-main-vid');
                if (!vid) return;
                const rect = progressWrap.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                vid.currentTime = pos * vid.duration;
            });

            let isControlsHidden = false;
            if (btnHide) {
                btnHide.addEventListener('click', () => {
                    isControlsHidden = !isControlsHidden;
                    if (isControlsHidden) {
                        btnPlay.style.display = 'none';
                        btnSound.style.display = 'none';
                        progressWrap.style.display = 'none';
                        if (timeDisplay) timeDisplay.style.display = 'none';
                        videoControls.style.justifyContent = 'flex-end';
                        btnHide.textContent = 'Show';
                    } else {
                        btnPlay.style.display = '';
                        btnSound.style.display = '';
                        progressWrap.style.display = 'flex';
                        if (timeDisplay) timeDisplay.style.display = '';
                        videoControls.style.justifyContent = 'space-between';
                        btnHide.textContent = 'Hide';
                    }
                });
            }

            document.querySelector('.view-image').addEventListener('click', (e) => {
                e.stopPropagation();

                const clickX = e.clientX;
                const screenWidth = window.innerWidth;

                if (clickX > screenWidth / 2) {
                    if (currentViewerIndex < currentProjectFiles.length - 1) {
                        currentViewerIndex++;
                        updateViewerFrame();
                    } else {
                        document.querySelector('.view-image-wrapper').click();
                    }
                } else {
                    if (currentViewerIndex > 0) {
                        currentViewerIndex--;
                        updateViewerFrame();
                    } else {
                        document.querySelector('.view-image-wrapper').click();
                    }
                }
            });

            document.querySelector('.view-image').addEventListener('mousemove', (e) => {
                const screenWidth = window.innerWidth;
                if (e.clientX > screenWidth / 2) {
                    if (currentViewerIndex < currentProjectFiles.length - 1) {
                        e.currentTarget.style.cursor = 'e-resize';
                    } else {
                        e.currentTarget.style.cursor = 'zoom-out';
                    }
                } else {
                    if (currentViewerIndex > 0) {
                        e.currentTarget.style.cursor = 'w-resize';
                    } else {
                        e.currentTarget.style.cursor = 'zoom-out';
                    }
                }
            });

            loadGalleryFromCloudinary()

            const infoCanvas = document.getElementById('info-background');
            const ictx = infoCanvas.getContext('2d');
            const $ = query => document.querySelector(query);
            const $$ = query => document.querySelectorAll(query);

            const infoBtn = $("#information-btn");
            const infoBlock = $("#information");
            const infoWrap = $(".information-wrapper");
            const lWrap = $(".left-wrapper");
            const rWrap = $(".right-wrapper");
            const viewImageWrapper = $('.view-image-wrapper');
            const viewImage = $('.view-image');
            const viewImageText = $('.view-image__text');
            const uiLayerBottom = $('.ui-layer__bottom');
            const instructions = $('.instructions');

            let isInfoOpen = false;

            infoBlock.onclick = () => {
                infoWrap.classList.remove("is-visible");
                isInfoOpen = false;
            };
            infoBtn.onclick = () => {
                infoWrap.classList.add("is-visible");
                isInfoOpen = true;
            };

            let currentLScroll = 0;
            let currentRScroll = 0;
            let targetLScroll = 0;
            let targetRScroll = 0;
            let activeCol = 'left';

            lWrap.addEventListener("wheel", () => { activeCol = 'left'; }, { passive: true });
            rWrap.addEventListener("wheel", () => { activeCol = 'right'; }, { passive: true });
            lWrap.addEventListener("touchstart", () => { activeCol = 'left'; }, { passive: true });
            rWrap.addEventListener("touchstart", () => { activeCol = 'right'; }, { passive: true });

            lWrap.addEventListener("scroll", () => {
                if (activeCol !== 'left') return;

                const maxScrollL = Math.max(0, lWrap.scrollHeight - lWrap.clientHeight);
                const maxScrollR = Math.max(0, rWrap.scrollHeight - rWrap.clientHeight);

                targetLScroll = lWrap.scrollTop;
                currentLScroll = targetLScroll;

                if (maxScrollL > 0) {
                    const progress = Math.max(0, Math.min(1, targetLScroll / maxScrollL));
                    targetRScroll = progress * maxScrollR;
                } else {
                    targetRScroll = 0;
                }
            }, { passive: true });

            rWrap.addEventListener("scroll", () => {
                if (activeCol !== 'right') return;

                const maxScrollL = Math.max(0, lWrap.scrollHeight - lWrap.clientHeight);
                const maxScrollR = Math.max(0, rWrap.scrollHeight - rWrap.clientHeight);

                targetRScroll = rWrap.scrollTop;
                currentRScroll = targetRScroll;

                if (maxScrollR > 0) {
                    const progress = Math.max(0, Math.min(1, targetRScroll / maxScrollR));
                    targetLScroll = progress * maxScrollL;
                } else {
                    targetLScroll = 0;
                }
            }, { passive: true });

            (function renderLoop() {
                if (!isInfoOpen) {
                    const ease = 0.07;

                    let diffL = targetLScroll - currentLScroll;
                    if (Math.abs(diffL) > 0.3) {
                        currentLScroll += diffL * ease;
                        if (activeCol !== 'left') lWrap.scrollTop = currentLScroll;
                    } else {
                        currentLScroll = targetLScroll;
                    }

                    let diffR = targetRScroll - currentRScroll;
                    if (Math.abs(diffR) > 0.3) {
                        currentRScroll += diffR * ease;
                        if (activeCol !== 'right') rWrap.scrollTop = currentRScroll;
                    } else {
                        currentRScroll = targetRScroll;
                    }
                }
                requestAnimationFrame(renderLoop);
            })();

            const topDesc = $('#top-image-description');
            const allImages = $$('.world-image');

            let isViewerOpen = false;

            allImages.forEach(imgContainer => {
                const imgElement = imgContainer.querySelector('img');

                imgContainer.addEventListener('mouseenter', () => {
                    if (isViewerOpen) return;
                    const description = imgElement.getAttribute('alt') || "";
                    topDesc.textContent = description;
                    topDesc.classList.add('is-visible');
                });

                imgContainer.addEventListener('mouseleave', () => {
                    topDesc.classList.remove('is-visible');
                });

                imgContainer.addEventListener('click', () => {
                    isViewerOpen = true;
                    const imgSrc = imgElement.getAttribute('src');
                    viewImage.innerHTML = `<img src="${imgSrc}" style="width: 100%; height: 100%; object-fit: contain;" alt="full-${imgSrc}">`;

                    viewImageWrapper.classList.add('is-visible');
                    gridOverlay.classList.add('is-visible');

                    setTimeout(() => { viewImageText.classList.add('is-visible'); }, 550);
                    setTimeout(() => { instructions.classList.add('is-hidden'); }, 150);

                    if(uiLayerBottom) uiLayerBottom.classList.add('is-hidden');
                    if(topDesc) topDesc.classList.remove('is-visible');
                });
            });

            viewImageWrapper.addEventListener('click', () => {
                isViewerOpen = false;

                if(topDesc){
                    topDesc.classList.remove('is-visible');
                }

                instructions.classList.remove('is-hidden');
                uiLayerBottom.classList.remove('is-hidden');
                viewImageText.classList.remove('is-visible');
                viewImageWrapper.classList.remove('is-visible');
                videoControls.classList.remove('is-visible');

                gridOverlay.classList.remove('is-visible');

                stopProgressLoop();
                document.querySelectorAll('#world video').forEach(v => v.play());

                setTimeout(() => {
                    if (!viewImageWrapper.classList.contains('is-visible')) {
                        viewImage.innerHTML = '';
                    }
                }, 600);
            });

            function drawGradient() {
                const cx = infoCanvas.width / 2;
                const cy = infoCanvas.height / 2;
                const radius = Math.max(infoCanvas.width, infoCanvas.height) / 1;
                const gradient = ictx.createRadialGradient(cx, cy, 0, cx, cy, radius);

                gradient.addColorStop(0, "#F61D3D");
                gradient.addColorStop(0.1, "#F61D3D");
                gradient.addColorStop(0.1, "#F61D3D");
                gradient.addColorStop(1, "#F61D3D");

                ictx.fillStyle = gradient;
                ictx.fillRect(0, 0, infoCanvas.width, infoCanvas.height);
            }

            function resizeCanvas() {
                infoCanvas.width = window.innerWidth;
                infoCanvas.height = window.innerHeight;
                drawGradient();
            }

            window.addEventListener('resize', resizeCanvas);
            infoBtn.addEventListener('click', resizeCanvas);
        </script>
    </body>
</html>
